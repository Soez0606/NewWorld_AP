# config/packages/security.yaml
security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        #users_in_memory: { memory: null }
        #2. DÉFINISSEZ VOTRE PROPRE FOURNISSEUR DOCTRINE
        app_user_provider:
            entity:
                # Indiquez à Symfony d'utiliser cette entité pour charger les utilisateurs
                class: App\Entity\Users
                property: email # propriété utilisée pour l'identification (email)
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        # admin:
        #     pattern: ^/admin
        #     form_login:
        #         login_path: admin_login
        #         check_path: admin_login
        #         default_target_path: admin # Où rediriger après succès (ex: vers le dashboard)
        #         # AJOUTEZ CES DEUX LIGNES
        #         username_parameter: email   # <-- Utilise le champ 'name="email"' de votre Twig
        #         password_parameter: password # <-- Utilise le champ 'name="password"' de votre Twig
        #     logout:
        #         path: admin_logout
        #         target: home
        main:
            lazy: true
            provider: app_user_provider #users_in_memory 
            # form_login:
            #     login_path: app_login
            #     check_path: app_login
            #     enable_csrf: true
                # username_parameter: email 
                # password_parameter: password
            custom_authenticators:
                - App\Security\FirstLoginAuthenticator
            logout:
                path: app_logout
                # where to redirect after logout
                target: app_login # Redirige vers la login page après logout
           

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        # 1. Autoriser la Déconnexion pour TOUT LE MONDE (Indispensable)
        # On suppose que votre route de logout est /admin/logout ou /logout. 
        # Dans le doute, on autorise tout ce qui est logout.
        - { path: ^/admin/logout, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }

        # 2. Autoriser la page de login
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login, roles: PUBLIC_ACCESS } # Au cas où l'ancienne URL traîne

        # 3. La définition de mot de passe (pour tous les connectés)
        - { path: ^/admin/set-password, roles: IS_AUTHENTICATED_FULLY }

        # 4. L'Espace Producteur (Uniquement pour eux)
        - { path: ^/espace-producteur, roles: ROLE_PRODUCER }

        # 5. Protéger le Backoffice (Dashboard)
        # Au lieu de bloquer sur ROLE_SECRETARY, on met une liste des rôles internes autorisés
        # OU on vérifie simplement qu'on n'est pas un simple user.
        # Voici la liste complète pour ne bloquer personne du staff :
        - { path: ^/admin, roles: [ROLE_SECRETARY, ROLE_PDG, ROLE_DIRECTOR, ROLE_MINI_ADMIN, ROLE_ADMIN] }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
